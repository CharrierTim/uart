name: HDL-check
on:
  push:
    branches:
      - main
    paths:
      - "sources/**/*.vhd"
      - "bench/**/*.vhd"
      - "tools/vsg/**"
      - ".github/workflows/hdl-check.yml"
      - ".github/actions/setup-environment/**"
  pull_request:
    paths:
      - "sources/**/*.vhd"
      - "bench/**/*.vhd"
      - "tools/vsg/**"
      - ".github/workflows/hdl-check.yml"
      - ".github/actions/setup-environment/**"

jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
      # General Setup
      - name: Checkout repo
        uses: actions/checkout@v6

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uv sync --group lint

      # Run Linting
      - name: Run Linting
        shell: bash
        run: |
          uv run ./tools/vsg/script/lint.py

      # Upload Linting results
      - name: Upload Linting results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: linting-artifacts
          path: |
            /tools/vsg/report/vsg_vhdl.xml
