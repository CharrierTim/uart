name: Setup Environment Action
description: "Setup the environment for the CI"

# Adapted from Open-Logic's setup-environment action:
# https://github.com/open-logic/open-logic/blob/main/.github/actions/simulation/action.yml

inputs:
  os:
    description: "CI environment"
    required: true

runs:
  using: "composite"
  steps:
    - name: Setup python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"

    - name: Setup uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

    - name: Install Python requirements
      shell: bash
      run: uv sync

    - name: Install APT packages
      shell: bash
      run: |
        sudo apt-get update
        xargs -a .github/workflows/apt-dependencies.txt sudo apt-get install -y

    - name: Download and extract GHDL
      shell: bash
      run: |
        mkdir -p ~/ghdl
        wget https://github.com/ghdl/ghdl/releases/download/v6.0.0-rc2/ghdl-mcode-6.0.0-rc2-ubuntu24.04-x86_64.tar.gz
        tar zxvf ghdl-mcode-6.0.0-rc2-ubuntu24.04-x86_64.tar.gz -C ~/ghdl --strip-components=1

    - name: Add GHDL to PATH
      shell: bash
      run: echo "$HOME/ghdl/bin" >> $GITHUB_PATH

    - name: mkdir
      shell: bash
      run: mkdir -p ~/nvc

    - name: cache-nvc
      id: cache-nvc
      uses: actions/cache@v5
      with:
        path: ~/nvc
        key: ${{ runner.os }}-nvc-r1.21.0

    - name: Build NVC if not cached
      if: steps.cache-nvc.outputs.cache-hit != 'true'
      shell: bash
      run: |
        git clone https://github.com/nickg/nvc.git ~/nvc
        cd ~/nvc
        git checkout r1.21.0
        ./autogen.sh
        mkdir build && cd build
        ../configure
        make

    - name: Install NVC
      shell: bash
      run: |
        cd ~/nvc/build
        sudo make install
